<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>ZZZ Shop Secure Payment</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #ffffff;
    }

    .card {
      width: min(92vw, 420px);
      padding: 30px 24px;
      border-radius: 22px;
      background: #111827;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
    }

    .logo {
      width: 78px;
      height: 78px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #1e293b;
      font-size: 38px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .amount {
      margin: 22px 0;
      padding: 16px;
      border-radius: 14px;
      background: #1e293b;
      font-size: 18px;
      font-weight: 700;
    }

    button {
      width: 100%;
      padding: 15px 18px;
      border: 0;
      border-radius: 13px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    #payButton {
      background: #f3ba2f;
      color: #111827;
    }

    #closeButton {
      margin-top: 12px;
      background: #334155;
      color: #ffffff;
    }

    .error {
      display: none;
      margin-top: 18px;
      color: #fca5a5;
    }

    .success {
      display: none;
      margin-top: 18px;
      color: #86efac;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo">💳</div>

    <h1>ZZZ Shop</h1>

    <p>
      Secure Binance payment চালু করতে নিচের button চাপুন।
    </p>

    <div class="amount" id="paymentInfo">
      Payment প্রস্তুত
    </div>

    <button id="payButton" type="button">
      Continue to Binance Payment
    </button>

    <button id="closeButton" type="button">
      Return to Telegram
    </button>

    <div id="success" class="success">
      Payment page browser-এ খোলা হয়েছে।<br>
      Payment complete করে Telegram-এ ফিরে আসুন।
    </div>

    <div id="error" class="error">
      Payment link পাওয়া যায়নি। Bot থেকে নতুন payment তৈরি করুন।
    </div>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;

    if (tg) {
      tg.ready();
      tg.expand();
    }

    function decodeBase64Url(value) {
      value = value.replace(/-/g, "+").replace(/_/g, "/");

      while (value.length % 4) {
        value += "=";
      }

      const binary = atob(value);

      const bytes = Uint8Array.from(
        binary,
        char => char.charCodeAt(0)
      );

      return new TextDecoder().decode(bytes);
    }

    function getPaymentUrl() {
      const token = new URLSearchParams(
        window.location.search
      ).get("u");

      if (!token) {
        return null;
      }

      const decoded = decodeBase64Url(token);
      const url = new URL(decoded);

      const valid =
        url.protocol === "https:" &&
        url.hostname === "zzzshop.paymently.io" &&
        url.pathname.startsWith("/checkout/");

      if (!valid) {
        return null;
      }

      return url.href;
    }

    const paymentUrl = getPaymentUrl();
    const payButton = document.getElementById("payButton");
    const closeButton = document.getElementById("closeButton");
    const errorBox = document.getElementById("error");
    const successBox = document.getElementById("success");

    if (!paymentUrl) {
      payButton.disabled = true;
      payButton.style.opacity = ".5";
      errorBox.style.display = "block";
    }

    payButton.addEventListener("click", function () {
      if (!paymentUrl) {
        errorBox.style.display = "block";
        return;
      }

      if (tg && typeof tg.openLink === "function") {
        tg.openLink(paymentUrl);
      } else {
        window.open(
          paymentUrl,
          "_blank",
          "noopener,noreferrer"
        );
      }

      successBox.style.display = "block";
    });

    closeButton.addEventListener("click", function () {
      if (tg && typeof tg.close === "function") {
        tg.close();
      } else {
        history.back();
      }
    });
  </script>
</body>
</html>
