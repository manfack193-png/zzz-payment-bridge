<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZZZ Shop Secure Payment</title>
  <meta name="theme-color" content="#0f172a">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #fff;
    }
    .card {
      width: min(88vw, 420px);
      padding: 30px;
      border-radius: 22px;
      background: #111827;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .logo {
      width: 74px;
      height: 74px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #1e293b;
      font-size: 34px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 18px auto;
      border: 4px solid rgba(255,255,255,.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .error {
      display: none;
      color: #fecaca;
      margin-top: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">💳</div>
    <h2>ZZZ Shop</h2>
    <p>Secure payment page খুলছে…</p>
    <div class="spinner"></div>
    <p id="error" class="error">Payment link invalid.</p>
  </main>

  <script>
    function decodeBase64Url(value) {
      value = value.replace(/-/g, "+").replace(/_/g, "/");
      while (value.length % 4) value += "=";
      return decodeURIComponent(
        Array.prototype.map.call(
          atob(value),
          c => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)
        ).join("")
      );
    }

    try {
      const token = new URLSearchParams(location.search).get("u");
      if (!token) throw new Error("Missing token");

      const target = decodeBase64Url(token);
      const url = new URL(target);

      const valid =
        url.protocol === "https:" &&
        url.hostname === "zzzshop.paymently.io" &&
        url.pathname.startsWith("/checkout/");

      if (!valid) throw new Error("Invalid target");

      setTimeout(() => {
        location.replace(url.href);
      }, 250);
    } catch (error) {
      document.querySelector(".spinner").style.display = "none";
      document.getElementById("error").style.display = "block";
    }
  </script>
</body>
</html>
